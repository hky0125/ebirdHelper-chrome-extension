<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>eBird Helper Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <header>
      <div class="logo-area">
        <img src="icons/icon48.png" alt="Logo" class="logo-img">
        <h1>eBird Helper</h1>
      </div>
      <div class="version">v2026.JUN.19</div>
    </header>

    <main>
      <!-- Features List -->
      <section class="section">

        <!-- Toggle: Translation -->
        <div class="setting-item">
          <div class="setting-info">
            <span class="setting-label">添加中文鸟名</span>
          </div>
          <label class="switch">
            <input type="checkbox" id="toggle-translation" checked>
            <span class="slider"></span>
          </label>
        </div>

        <!-- Toggle: Ruby Pinyin (Secondary) -->
        <div class="setting-item sub-setting">
          <div class="setting-info">
            <span class="setting-label">生僻字拼音注音</span>
            <span class="setting-desc">为鸟名生僻字添加上方拼音</span>
          </div>
          <label class="switch">
            <input type="checkbox" id="toggle-ruby-pinyin" checked>
            <span class="slider"></span>
          </label>
        </div>

        <!-- Highlight Group -->
        <div class="setting-item highlight-group">
          <div class="setting-info">
            <span class="setting-label">高亮未见鸟种与特有种</span>
          </div>
          <label class="switch">
            <input type="checkbox" id="toggle-highlight-group" checked>
            <span class="slider"></span>
          </label>
        </div>

        <!-- Toggle: Highlight Unseen -->
        <div class="setting-item sub-setting highlight-child">
          <div class="setting-info">
            <span class="setting-label">未见鸟种</span>
            <span class="setting-desc">将您的生涯清单未收集的鸟种进行高亮</span>
          </div>
          <label class="switch">
            <input type="checkbox" id="toggle-highlight" checked>
            <span class="slider"></span>
          </label>
        </div>

        <!-- Toggle: Endemic Highlight -->
        <div class="setting-item sub-setting highlight-child">
          <div class="setting-info">
            <span class="setting-label">单国特有鸟种</span>
            <span class="setting-desc">使用不同颜色高亮单国特有鸟种</span>
          </div>
          <label class="switch">
            <input type="checkbox" id="toggle-endemic" checked>
            <span class="slider"></span>
          </label>
        </div>

        <!-- Toggle: Pinyin Search -->
        <div class="setting-item">
          <div class="setting-info">
            <span class="setting-label">拼音快速检索</span>
            <span class="setting-desc">记录清单输入框中输入拼音首字母进行快速定位</span>
          </div>
          <label class="switch">
            <input type="checkbox" id="toggle-pinyin" checked>
            <span class="slider"></span>
          </label>
        </div>
      </section>

      <!-- Styling Options -->
      <section class="section">
        <div class="color-item">
          <div class="setting-info">
            <span class="setting-label">未见鸟种高亮色</span>
          </div>
          <div class="color-picker-wrapper">
            <span class="color-val" id="color-highlight-val">#a35f00</span>
            <input type="color" id="color-highlight" value="#a35f00">
          </div>
        </div>

        <div class="color-item">
          <div class="setting-info">
            <span class="setting-label">特有种高亮色</span>
          </div>
          <div class="color-picker-wrapper">
            <span class="color-val" id="color-endemic-val">#c0262e</span>
            <input type="color" id="color-endemic" value="#c0262e">
          </div>
        </div>
      </section>

      <!-- Cache & Action Settings -->
      <section class="section">
        <div class="cache-status">
          <span>已缓存生涯鸟种: </span>
          <strong id="species-count">0</strong> 种
        </div>

        <p class="cache-hint">
          * 打开 eBird 的 <a href="https://ebird.org/lifelist?time=life&r=world" target="_blank" class="link">生涯清单页面</a>
          会自动拉取并更新此缓存。
        </p>

        <div class="button-group">
          <button id="btn-clear-cache" class="btn btn-secondary">清空已见缓存</button>
          <a href="https://ebird.org/lifelist?time=life&r=world" target="_blank"
            class="btn btn-primary btn-link-action">去更新清单</a>
        </div>
      </section>
    </main>

    <footer>
      <span>Adapted from <a href="https://github.com/wzy0421/ebirdHelper">wzy0421/ebirdHelper</a> • eBird Helper Chrome
        Extension</span>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>

</html>
