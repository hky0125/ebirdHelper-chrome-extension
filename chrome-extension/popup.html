<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>eBird Helper Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <header>
      <div class="logo-area">
        <img src="icons/icon128.png" alt="Logo" class="logo-img">
        <h1> eBird Helper </h1>
      </div>
    </header>

    <main>
      <!-- Features List -->
      <section class="section">

        <!-- Toggle: Translation -->
        <div class="setting-item">
          <div class="setting-info"> <span class="setting-label"> 添加中文鸟名 </span> </div>
          <label class="switch">
            <input type="checkbox" id="toggle-translation" checked>
            <span class="slider"></span>
          </label>
        </div>

        <!-- Toggle: Ruby Pinyin (Secondary) -->
        <div class="setting-item sub-setting">
          <div class="setting-info">
            <span class="setting-label">生僻字注音</span>
          </div>
          <label class="switch">
            <input type="checkbox" id="toggle-ruby-pinyin" checked>
            <span class="slider"></span>
          </label>
        </div>

        <!-- Highlight Group -->
        <div class="setting-item highlight-group">
          <div class="setting-info"> <span class="setting-label">高亮鸟种</span> </div>
          <label class="switch">
            <input type="checkbox" id="toggle-highlight-group" checked>
            <span class="slider"></span>
          </label>
        </div>

        <!-- Toggle: Highlight Unseen -->
        <div class="setting-item sub-setting highlight-child">
          <div class="setting-info">
            <span class="setting-label">未见鸟种</span>
          </div>
          <label class="switch">
            <input type="checkbox" id="toggle-highlight" checked>
            <span class="slider"></span>
          </label>
        </div>

        <!-- Toggle: Endemic Highlight -->
        <div class="setting-item sub-setting highlight-child">
          <div class="setting-info">
            <span class="setting-label">单国特有鸟种</span>
          </div>
          <label class="switch">
            <input type="checkbox" id="toggle-endemic" checked>
            <span class="slider"></span>
          </label>
        </div>

        <!-- Toggle: Pinyin Search -->
        <div class="setting-item">
          <div class="setting-info">
            <span class="setting-label">记录清单拼音快速检索</span>
          </div>
          <label class="switch">
            <input type="checkbox" id="toggle-pinyin" checked>
            <span class="slider"></span>
          </label>
        </div>
      </section>

      <!-- Styling Options -->
      <section class="section">
        <div class="color-item">
          <div class="setting-info">
            <span class="setting-label">未见鸟种高亮色</span>
          </div>
          <div class="color-picker-wrapper">
            <input type="color" id="color-highlight" value="#ff8d28">
          </div>
        </div>

        <div class="color-item">
          <div class="setting-info">
            <span class="setting-label">特有种高亮色</span>
          </div>
          <div class="color-picker-wrapper">
            <input type="color" id="color-endemic" value="#ff2d55">
          </div>
        </div>
      </section>

      <!-- Cache & Action Settings -->
      <section class="section">
        <div class="cache-status">
          <span class="setting-label">已缓存生涯鸟种: </span>
          <strong id="species-count"> 0 </strong> 
        </div>
        <div class="button-group">
          <button id="btn-clear-cache" class="btn btn-secondary"> 清空缓存 </button>
          <a href="https://ebird.org/lifelist?time=life&r=world" target="_blank"
            class="btn btn-primary btn-link-action">更新清单</a>
        </div>
      </section>
    </main>


    <footer>
      <span>Adapted from <a href="https://github.com/wzy0421/ebirdHelper">wzy0421/ebirdHelper</a></span>
    </footer>

  </div>


  <script src="popup.js"></script>
</body>

</html>
